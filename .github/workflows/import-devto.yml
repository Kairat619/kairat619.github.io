name: Import Dev.to posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  import-devto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import and translate Dev.to posts
        env:
          DEVTO_USERNAME: ${{ secrets.DEVTO_USERNAME }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          TRANSLATION_LANGUAGE: Kazakh
          TARGET_LOCALE: kk
          DEVTO_IMPORT_DRAFT: "false"
        run: pnpm run sync:devto

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/blog/_devto
          git diff --cached --quiet && exit 0
          git commit -m "Import translated Dev.to posts"
          git push
